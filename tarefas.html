
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>To-Do List Upgrade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        :root {
            --bg: #fdfdfd;
            --text: #333;
            --item-bg: #f7f7f7;
            --accent: #a3c4f3;
        }
        .dark {
            --bg: #2b2b2b;
            --text: #f5f5f5;
            --item-bg: #3a3a3a;
        }
        .top-bar {
            display: flex;
            gap: 10px;
            padding: 10px;
        }
        .container {
            max-width: 700px;
            margin: 20px auto;
        }
        .block {
            background: var(--item-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: var(--accent);
            margin: 5px 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            color: #000;
        }
        li.completed {
            text-decoration: line-through;
            opacity: 0.7;
        }
        .task-buttons {
            display: flex;
            gap: 5px;
        }
        button {
            border-radius: 5px;
            border: none;
            padding: 5px 8px;
            cursor: pointer;
            background: var(--text);
            color: var(--bg);
        }
        input, select {
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #taskInput {
            width: 50%;
            padding: 6px;
            margin-bottom: 10px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 6px;
        }
        h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-btn {
            padding: 2px 6px;
        }
        #colorPicker {
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="top-bar">
    <button onclick="toggleDarkMode()">🌙</button>
    <input type="color" id="colorPicker" onchange="setAccentColor(this.value)" />
</div>

<div class="container">
    <div class="block">
        <h1>To-Do List ✨</h1>

        <input id="taskInput" placeholder="✍️ Nova tarefa..." />

        <div class="input-row">
            <input id="categoryInput" placeholder="📂 Categoria" />
            <input type="date" id="dateInput" />
        </div>

        <button onclick="addTask()">Adicionar</button>

        <select id="filter" onchange="renderTasks()">
            <option value="all">Todas</option>
            <option value="pending">Pendentes</option>
            <option value="completed">Concluídas</option>
        </select>
    </div>

    <div class="block" id="categories"></div>

    <div class="block">
        <h2>Calendário</h2>
        <ul id="calendarList"></ul>
    </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let preferences = JSON.parse(localStorage.getItem("preferences")) || {
        theme: "light",
        accent: "#a3c4f3"
    };

    let collapsedCategories = {};

    function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function savePreferences() {
        localStorage.setItem("preferences", JSON.stringify(preferences));
    }

    function addTask() {
        const input = document.getElementById("taskInput");
        const category = document.getElementById("categoryInput").value.trim() || "Sem categoria";
        const date = document.getElementById("dateInput").value;

        if (input.value.trim() === "") return;

        tasks.push({
            text: input.value,
            completed: false,
            category,
            date
        });

        input.value = "";
        document.getElementById("categoryInput").value = "";
        document.getElementById("dateInput").value = "";

        saveTasks();
        renderTasks();
    }

    document.getElementById("taskInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") addTask();
    });

    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        saveTasks();
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
    }

    function editTask(index) {
        const newText = prompt("Edite sua tarefa:", tasks[index].text);
        if (newText && newText.trim() !== "") {
            tasks[index].text = newText;
            saveTasks();
            renderTasks();
        }
    }

    function toggleCategory(cat) {
        collapsedCategories[cat] = !collapsedCategories[cat];
        renderTasks();
    }

    function renderTasks() {
        const categoriesDiv = document.getElementById("categories");
        categoriesDiv.innerHTML = "";

        const filter = document.getElementById("filter").value;
        const grouped = {};

        tasks.forEach((task, i) => {
            if (filter === "pending" && task.completed) return;
            if (filter === "completed" && !task.completed) return;

            if (!grouped[task.category]) grouped[task.category] = [];

            grouped[task.category].push({ ...task, index: i });
        });

        for (const cat in grouped) {
            const h2 = document.createElement("h2");
            h2.textContent = cat;

            const toggleBtn = document.createElement("button");
            toggleBtn.textContent = collapsedCategories[cat] ? "+" : "-";
            toggleBtn.onclick = () => toggleCategory(cat);

            h2.appendChild(toggleBtn);
            categoriesDiv.appendChild(h2);

            if (!collapsedCategories[cat]) {
                const ul = document.createElement("ul");

                grouped[cat].forEach(task => {
                    const li = document.createElement("li");
                    li.textContent = task.text + (task.date ? " 📅 " + task.date : "");

                    if (task.completed) li.classList.add("completed");

                    const btns = document.createElement("div");

                    const done = document.createElement("button");
                    done.textContent = "✔";
                    done.onclick = () => toggleTask(task.index);

                    const edit = document.createElement("button");
                    edit.textContent = "✏️";
                    edit.onclick = () => editTask(task.index);

                    const del = document.createElement("button");
                    del.textContent = "🗑";
                    del.onclick = () => deleteTask(task.index);

                    btns.appendChild(done);
                    btns.appendChild(edit);
                    btns.appendChild(del);

                    li.appendChild(btns);
                    ul.appendChild(li);
                });

                categoriesDiv.appendChild(ul);
            }
        }

        renderCalendar();
    }

    function renderCalendar() {
        const calendarList = document.getElementById("calendarList");
        calendarList.innerHTML = "";

        tasks.forEach(task => {
            if (task.date) {
                const li = document.createElement("li");
                li.textContent = `${task.date}: ${task.text} (${task.category})`;
                calendarList.appendChild(li);
            }
        });
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark");

        preferences.theme = document.body.classList.contains("dark") ? "dark" : "light";
        savePreferences();
    }

    function setAccentColor(color) {
        document.documentElement.style.setProperty("--accent", color);
        preferences.accent = color;
        savePreferences();
    }

    function applyPreferences() {
        if (preferences.theme === "dark") {
            document.body.classList.add("dark");
        }

        document.documentElement.style.setProperty("--accent", preferences.accent);
        document.getElementById("colorPicker").value = preferences.accent;
    }

    // INIT
    applyPreferences();
    renderTasks();
</script>
</body>
</html>
